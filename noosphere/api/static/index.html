<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noosphere</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <script>(function(){var t=localStorage.getItem('noosphere-theme');if(t)document.documentElement.classList.add(t)})();</script>
    <link rel="stylesheet" href="/static/styles.css?v=3" />
  </head>
  <body>
    <div id="app">
      <div id="page-landing" class="page"></div>

      <div id="page-main" class="page hidden">
        <aside class="sidebar" id="sidebar">
          <div class="sb-header">
            <a href="#/main" class="sb-logo">
              <svg width="17" height="17" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="3"/><circle cx="20" cy="24" r="5" fill="currentColor" opacity="0.7"/><circle cx="44" cy="20" r="4" fill="currentColor" opacity="0.6"/><circle cx="36" cy="42" r="6" fill="currentColor" opacity="0.8"/></svg>
              <span class="sb-logo-text">Noosphere</span>
            </a>
            <button class="sb-toggle" id="sb-toggle" title="Toggle sidebar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
          </div>

          <a href="#/main" class="sb-nav" id="nav-network">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="8" r="2.5"/><circle cx="8" cy="18" r="2.5"/><line x1="8.2" y1="7.2" x2="15.8" y2="7.2"/><line x1="7" y1="8.3" x2="7.5" y2="15.5"/></svg>
            <span class="sb-label">Network</span>
          </a>

          <div class="sb-section-title">My Corpora</div>
          <div id="sb-corpora"></div>

          <div class="sb-bottom">
            <button class="sb-icon-btn" id="dark-toggle" title="Toggle dark mode">
              <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
          </div>
        </aside>

        <main class="content" id="content"></main>
        <aside class="rpanel hidden" id="rpanel"></aside>
      </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="modal-title">Expand the Noosphere</h2>
          <button class="modal-x" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
          <button class="btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-submit">Publish</button>
        </div>
        <div class="modal-status hidden" id="modal-status"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="/static/app.js?v=3"></script>
  </body>
</html>
