# Deploy to Fly.io: fly launch --no-deploy, then fly deploy
# Set secrets: fly secrets set OPENAI_API_KEY=sk-... DATABASE_URL=postgres://...

app = "noosphere-wiki"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8420"
  HOST = "0.0.0.0"
  ENABLE_CLOUD = "true"
  NOOSPHERE_REGISTRY = "none"  # The cloud app IS the registry

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
